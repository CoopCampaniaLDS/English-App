<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Mastery Engine 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<style>
/* ─────────────────────────────────────────────
   DESIGN TOKEN SYSTEM
   Palette: Deep Midnight × Warm Ivory × Electric Blue
───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080818;
  --surface:#0e0e24;
  --card:#13132e;
  --raised:#1a1a3a;
  --hover:#1f1f45;

  --border:#1e1e48;
  --border2:#2a2a60;

  --blue:#5b8fff;
  --blue-dim:rgba(91,143,255,.13);
  --blue-glow:rgba(91,143,255,.25);
  --violet:#a374ff;
  --violet-dim:rgba(163,116,255,.13);
  --green:#29e07a;
  --green-dim:rgba(41,224,122,.12);
  --red:#ff5370;
  --red-dim:rgba(255,83,112,.12);
  --orange:#ff9248;
  --orange-dim:rgba(255,146,72,.12);
  --gold:#ffc947;
  --gold-dim:rgba(255,201,71,.12);
  --cyan:#00ddc8;
  --cyan-dim:rgba(0,221,200,.12);

  --text:#e8eaf6;
  --text2:#7b82a8;
  --text3:#3d4070;

  --radius:12px;
  --radius-sm:8px;
  --font:'Plus Jakarta Sans',sans-serif;
  --font-serif:'Lora',serif;
}

html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100%;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(91,143,255,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(163,116,255,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── LAYOUT ── */
#shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;}
#sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
#view{flex:1;overflow-y:auto;padding:32px 36px 40px;}

/* ── BRAND ── */
.brand{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--violet));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-name{font-size:1rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-version{font-size:.68rem;color:var(--text3);font-weight:500;}
.phase-chip{display:inline-flex;align-items:center;gap:5px;background:var(--blue-dim);border:1px solid rgba(91,143,255,.25);color:var(--blue);font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;}

/* ── NAV ── */
.nav-scroll{flex:1;overflow-y:auto;padding:10px 0;}
.nav-group-label{font-size:.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 20px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:.85rem;font-weight:500;transition:all .15s;position:relative;border-left:3px solid transparent;margin:1px 0;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);border-left-color:var(--border2);}
.nav-item.active{color:var(--blue);background:var(--blue-dim);border-left-color:var(--blue);font-weight:600;}
.nav-icon{width:32px;height:32px;border-radius:8px;background:var(--raised);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.nav-item.active .nav-icon{background:rgba(91,143,255,.2);}
.nav-item svg{width:14px;height:14px;}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:20px;min-width:22px;text-align:center;}

/* ── SIDEBAR BOTTOM ── */
.sb-bottom{padding:14px 16px;border-top:1px solid var(--border);}
.level-widget{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.level-name{font-size:.78rem;font-weight:700;color:var(--blue);margin-bottom:2px;}
.level-sub{font-size:.68rem;color:var(--text3);margin-bottom:8px;}
.xp-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--violet));transition:width 1.2s cubic-bezier(.34,1.56,.64,1);}
.xp-nums{display:flex;justify-content:space-between;margin-top:5px;font-size:.67rem;color:var(--text3);}
.mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
.mode-pill{padding:7px 0;text-align:center;font-size:.75rem;font-weight:600;cursor:pointer;border-radius:8px;border:1.5px solid var(--border);color:var(--text3);transition:all .15s;}
.mode-pill.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}

/* ── MOBILE NAV ── */
#mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(14,14,36,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;padding:6px 0 max(env(safe-area-inset-bottom,0px),4px);}
.mob-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--text3);font-size:.52rem;font-weight:600;transition:color .15s;}
.mob-item.active{color:var(--blue);}
.mob-item svg{width:18px;height:18px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s,box-shadow .2s;}
.card-hover:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.card-blue{background:linear-gradient(135deg,var(--card),rgba(91,143,255,.05));border-color:rgba(91,143,255,.2);}
.card-violet{background:linear-gradient(135deg,var(--card),rgba(163,116,255,.05));border-color:rgba(163,116,255,.2);}
.card-green{background:linear-gradient(135deg,var(--card),rgba(41,224,122,.05));border-color:rgba(41,224,122,.2);}
.card-red{background:linear-gradient(135deg,var(--card),rgba(255,83,112,.05));border-color:rgba(255,83,112,.2);}
.card-gold{background:linear-gradient(135deg,var(--card),rgba(255,201,71,.05));border-color:rgba(255,201,71,.2);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.71rem;font-weight:700;}
.b-blue{background:var(--blue-dim);color:var(--blue);}
.b-violet{background:var(--violet-dim);color:var(--violet);}
.b-green{background:var(--green-dim);color:var(--green);}
.b-red{background:var(--red-dim);color:var(--red);}
.b-orange{background:var(--orange-dim);color:var(--orange);}
.b-gold{background:var(--gold-dim);color:var(--gold);}
.b-cyan{background:var(--cyan-dim);color:var(--cyan);}
.b-muted{background:var(--raised);color:var(--text3);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--font);font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;line-height:1;}
.btn svg{width:14px;height:14px;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#729bff;transform:translateY(-1px);box-shadow:0 5px 18px rgba(91,143,255,.35);}
.btn-secondary{background:var(--raised);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--hover);border-color:var(--border2);}
.btn-red{background:var(--red-dim);color:var(--red);border:1.5px solid rgba(255,83,112,.25);}
.btn-red:hover{background:rgba(255,83,112,.22);}
.btn-green{background:var(--green-dim);color:var(--green);border:1.5px solid rgba(41,224,122,.25);}
.btn-green:hover{background:rgba(41,224,122,.22);}
.btn-violet{background:var(--violet-dim);color:var(--violet);border:1.5px solid rgba(163,116,255,.25);}
.btn-violet:hover{background:rgba(163,116,255,.22);}
.btn-lg{padding:13px 26px;font-size:.92rem;}
.btn-sm{padding:5px 12px;font-size:.76rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* ── INPUTS ── */
.inp{background:var(--raised);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 14px;font-family:var(--font);font-size:.88rem;transition:border-color .15s;outline:none;width:100%;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,143,255,.12);}
.inp::placeholder{color:var(--text3);}
textarea.inp{resize:vertical;min-height:100px;line-height:1.65;}
select.inp{cursor:pointer;}

/* ── PROGRESS BARS ── */
.bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.34,1.56,.64,1);}
.fill-blue{background:linear-gradient(90deg,var(--blue),#8cb4ff);}
.fill-green{background:linear-gradient(90deg,var(--green),#7cf0b0);}
.fill-violet{background:linear-gradient(90deg,var(--violet),#c9a3ff);}
.fill-gradient{background:linear-gradient(90deg,var(--blue),var(--violet));}

/* ── TABS ── */
.tab-row{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:24px;overflow-x:auto;}
.tab{padding:10px 18px;font-size:.84rem;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2.5px solid transparent;transition:all .15s;margin-bottom:-1.5px;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}

/* ── TASK ITEMS ── */
.task-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s;}
.task-row:last-child{border:none;}
.task-row.done{opacity:.45;}
.task-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.task-check.on{background:var(--green);border-color:var(--green);}
.task-check.on svg{display:block;}
.task-check svg{display:none;width:12px;height:12px;stroke:#000;stroke-width:3;}
.task-label{font-size:.88rem;font-weight:500;color:var(--text);line-height:1.4;}
.task-row.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-meta{font-size:.73rem;color:var(--text3);margin-top:3px;}

/* ── HEATMAP ── */
.heatmap-wrap{display:flex;gap:3px;overflow-x:auto;padding-bottom:6px;}
.hm-col{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.hm-cell{width:12px;height:12px;border-radius:3px;background:var(--border);transition:transform .1s;cursor:default;}
.hm-cell:hover{transform:scale(1.5);z-index:1;position:relative;}
.hm-l1{background:rgba(91,143,255,.22);}
.hm-l2{background:rgba(91,143,255,.48);}
.hm-l3{background:rgba(91,143,255,.74);}
.hm-l4{background:var(--blue);box-shadow:0 0 4px var(--blue-glow);}

/* ── FLIP CARD ── */
.flip-card{width:100%;height:180px;perspective:1000px;cursor:pointer;max-width:520px;margin:0 auto;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;}
.flip-f{background:var(--card);border:1.5px solid var(--border);}
.flip-b{background:var(--raised);border:1.5px solid rgba(91,143,255,.3);transform:rotateY(180deg);}

/* ── RECORDING ── */
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.rec-dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse-dot 1s infinite;display:inline-block;}
@keyframes wave-bar{0%,100%{height:5px}50%{height:26px}}
.wave-bar{width:4px;border-radius:3px;background:linear-gradient(to top,var(--blue),var(--violet));animation:wave-bar .65s ease-in-out infinite;}
.wave-bar:nth-child(2){animation-delay:.1s}
.wave-bar:nth-child(3){animation-delay:.2s}
.wave-bar:nth-child(4){animation-delay:.3s}
.wave-bar:nth-child(5){animation-delay:.2s}
.wave-bar:nth-child(6){animation-delay:.1s}
.timer-display{font-size:4rem;font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--blue);}

/* ── PANIC OVERLAY ── */
@keyframes panic-glow{0%,100%{box-shadow:0 0 0 0 rgba(255,83,112,.4)}50%{box-shadow:0 0 0 14px rgba(255,83,112,0)}}
.big-panic-btn{width:100%;padding:16px;background:var(--red-dim);border:2px solid var(--red);border-radius:12px;color:var(--red);font-size:.95rem;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s;animation:panic-glow 2s infinite;}
.big-panic-btn:hover{background:rgba(255,83,112,.2);transform:scale(1.015);}

#panic-overlay{position:fixed;inset:0;background:rgba(18,0,4,.96);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center;}
#panic-overlay.on{display:flex;}
.panic-timer{font-size:5.5rem;font-weight:800;color:var(--red);text-shadow:0 0 40px rgba(255,83,112,.5);line-height:1;font-variant-numeric:tabular-nums;}
.panic-scenario-text{font-size:1.05rem;line-height:1.75;color:var(--text);max-width:560px;margin:22px 0 8px;}
.panic-tag{font-size:.75rem;color:var(--text3);margin-bottom:22px;}

/* ── MODAL ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,20,.75);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center;}
#overlay.on{display:flex;}
#modal-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:16px;padding:28px;width:94%;max-width:520px;max-height:88vh;overflow-y:auto;position:relative;}

/* ── TOAST ── */
#toast-stack{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:11px 18px;background:var(--raised);border:1.5px solid var(--border2);border-radius:10px;font-size:.84rem;font-weight:500;max-width:320px;animation:toast-in .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.5);}
@keyframes toast-in{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── QUIZ BUTTONS ── */
.q-opt{padding:11px 15px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.86rem;color:var(--text);text-align:left;width:100%;font-family:var(--font);font-weight:500;transition:all .15s;}
.q-opt:hover:not([data-answered]){border-color:var(--border2);background:var(--raised);}
.q-opt.q-correct{border-color:var(--green);background:var(--green-dim);color:var(--green);cursor:default;}
.q-opt.q-wrong{border-color:var(--red);background:var(--red-dim);color:var(--red);cursor:default;}
.q-opt[data-answered]{cursor:default;}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── HELPERS ── */
.divider{height:1px;background:var(--border);margin:16px 0;}
.script-line{background:var(--raised);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:13px 16px;font-family:var(--font-serif);font-style:italic;color:var(--text2);line-height:1.75;font-size:.9rem;}
.highlight{background:var(--blue-dim);border:1.5px solid rgba(91,143,255,.2);border-radius:var(--radius-sm);padding:13px 16px;}
.section-title{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;}
.section-sub{font-size:.86rem;color:var(--text2);margin-bottom:24px;}
.label{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-big{font-size:2.2rem;font-weight:800;line-height:1;letter-spacing:-.03em;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ── ANIMATIONS ── */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .4s ease both;}
.rise-1{animation:rise .4s .06s ease both;opacity:0;}
.rise-2{animation:rise .4s .12s ease both;opacity:0;}
.rise-3{animation:rise .4s .18s ease both;opacity:0;}
.rise-4{animation:rise .4s .24s ease both;opacity:0;}
.rise-5{animation:rise .4s .30s ease both;opacity:0;}
@keyframes breathe{0%,100%{opacity:.9}50%{opacity:.5}}
.breathe{animation:breathe 2.5s ease-in-out infinite;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{display:none;}#mob-bar{display:block;}
  #view{padding:18px 16px 80px;}
  .section-title{font-size:1.3rem;}
}
</style>
</head>
<body>

<div id="shell">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">🎯</div>
        <div>
          <div class="brand-name">English Mastery</div>
          <div class="brand-version">2026 Total Fluency</div>
        </div>
      </div>
      <div class="phase-chip" id="phase-chip">Phase 1</div>
    </div>

    <div class="nav-scroll">
      <div class="nav-group-label">Training</div>
      <nav id="nav-links"></nav>
    </div>

    <div class="sb-bottom">
      <div class="mode-switch" id="mode-switch">
        <div class="mode-pill on" id="mode-b" onclick="setMode('business')">💼 Work</div>
        <div class="mode-pill" id="mode-l" onclick="setMode('life')">☀️ Life</div>
      </div>
      <div class="level-widget">
        <div class="level-name" id="sb-level">Loading…</div>
        <div class="level-sub" id="sb-next">Loading…</div>
        <div class="xp-bar"><div class="xp-fill" id="sb-fill" style="width:0%"></div></div>
        <div class="xp-nums">
          <span id="sb-xp">0 XP</span>
          <span>🔥 <span id="sb-streak">0</span> days</span>
        </div>
      </div>
      <button class="btn btn-secondary" style="width:100%;font-size:.8rem;" onclick="openSettings()">
        <i data-lucide="settings"></i> Settings & Stats
      </button>
    </div>
  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <main id="main"><div id="view"></div></main>
</div>

<!-- Mobile bottom nav -->
<nav id="mob-bar"><div class="mob-grid" id="mob-inner"></div></nav>

<!-- Modal -->
<div id="overlay" onclick="maybeCloseModal(event)"><div id="modal-box"><div id="modal-content"></div></div></div>

<!-- Panic Overlay -->
<div id="panic-overlay">
  <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:var(--red);margin-bottom:14px;opacity:.6;">⚡ Emergency Speaking Drill</div>
  <div class="panic-timer" id="panic-count">30</div>
  <div class="panic-scenario-text" id="panic-text"></div>
  <div class="panic-tag" id="panic-tag"></div>
  <div style="display:flex;gap:12px;">
    <button class="btn btn-secondary" onclick="endPanic()">⏹ Stop</button>
    <button class="btn btn-lg" style="background:var(--red);color:#fff;" onclick="panicComplete()">✅ I Responded!</button>
  </div>
</div>

<div id="toast-stack"></div>

<!-- ═══════════════════════════════════════════════════════
     CONTENT DATABASE — Edit these arrays to update content
═══════════════════════════════════════════════════════ -->
<script>

// ──────────────────────────────────────────────────────────
//  CONTENT DATABASE
// ──────────────────────────────────────────────────────────

const APP = {view:'dashboard',data:{}};

function load(){
  try{const r=localStorage.getItem('eme26');APP.data=r?{...DEFAULTS,...JSON.parse(r)}:{...DEFAULTS};}
  catch{APP.data={...DEFAULTS};}
  checkStreak();
}
function save(){try{localStorage.setItem('eme26',JSON.stringify(APP.data));}catch(e){}}

function today(){return new Date().toISOString().slice(0,10);}

function checkStreak(){
  const d=today(),last=APP.data.lastDate;
  if(!last)return;
  const diff=Math.round((new Date(d)-new Date(last))/86400000);
  if(diff>1){APP.data.streak=0;save();}
}

function addXP(amt,reason=''){
  APP.data.xp+=amt;
  const d=today();
  APP.data.activity[d]=(APP.data.activity[d]||0)+amt;
  if(APP.data.lastDate!==d){
    if(APP.data.lastDate){
      const gap=Math.round((new Date(d)-new Date(APP.data.lastDate))/86400000);
      APP.data.streak=gap===1?APP.data.streak+1:1;
    }else APP.data.streak=1;
    APP.data.lastDate=d;APP.data.totalDays++;
  }
  save();toast(`+${amt} XP${reason?' · '+reason:''}`);
  updateSidebar();
}

function getLevel(xp){
  let l=LEVELS[0];
  for(const lv of LEVELS){if(xp>=lv.xp)l=lv;}
  return l;
}

function getLevelPct(xp){
  let cur=LEVELS[0],next=LEVELS[1];
  for(let i=0;i<LEVELS.length-1;i++){
    if(xp>=LEVELS[i].xp&&xp<LEVELS[i+1].xp){cur=LEVELS[i];next=LEVELS[i+1];break;}
    if(i===LEVELS.length-2&&xp>=LEVELS[i+1].xp){cur=LEVELS[i+1];next=null;break;}
  }
  if(!next)return{cur,next:null,pct:100};
  return{cur,next,pct:Math.round((xp-cur.xp)/(next.xp-cur.xp)*100)};
}

function calculateNextGoal(){
  const now=new Date(),aug=new Date('2026-09-01');
  if(now<aug){
    const days=Math.round((aug-now)/86400000);
    return{phase:1,milestone:'August 2026 — B2 Fluency',daysLeft:days,focus:'Foundation & Immersion'};
  }
  const phaseN=Math.floor((now-aug)/(86400000*120))+2;
  const milestones=["C1 Advanced: Conferences & Presentations","C1+ Mastery: Podcasting & Writing in English","C2 Fluency: Think and Dream in English","Teach Others: Mentor non-native speakers"];
  const idx=Math.min(phaseN-2,milestones.length-1);
  return{phase:phaseN,milestone:milestones[idx],daysLeft:120,focus:'Mastery & Performance'};
}

function buildHeatmap(id,weeks){
  const el=document.getElementById(id);
  if(!el)return;
  const now=new Date();
  const cols=[];
  for(let w=weeks-1;w>=0;w--){
    const col=[];
    for(let d=0;d<=6;d++){
      const dt=new Date(now);
      dt.setDate(now.getDate()-(w*7)-(6-d));
      const k=dt.toISOString().slice(0,10);
      const xp=APP.data.activity[k]||0;
      const lv=xp===0?0:xp<30?1:xp<70?2:xp<120?3:4;
      col.push({k,xp,lv});
    }
    cols.push(col);
  }
  el.innerHTML=cols.map(c=>`<div class="hm-col">${c.map(x=>`<div class="hm-cell${x.lv>0?' hm-l'+x.lv:''}" title="${x.k}: ${x.xp} XP"></div>`).join('')}</div>`).join('');
}

function toggleRec(){isRec?stopRec():startRec();}

function startRec(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    isRec=true;audioChunks=[];audioBlob=null;
    mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>audioChunks.push(e.data);
    mediaRec.onstop=()=>{
      audioBlob=new Blob(audioChunks,{type:'audio/webm'});
      stream.getTracks().forEach(t=>t.stop());
      const pb=document.getElementById('play-btn');if(pb)pb.style.display='inline-flex';
      const ep=document.getElementById('eval-panel');if(ep)ep.style.display='block';
      const rb=document.getElementById('rec-btn');if(rb){rb.innerHTML='<i data-lucide="mic"></i> Record Again';rb.style.background='';}
      lucide.createIcons();
    };
    mediaRec.start();
    const rb=document.getElementById('rec-btn');
    if(rb){rb.innerHTML='<span class="rec-dot"></span>&nbsp; Stop Recording';rb.style.background='var(--red)';}
    const wv=document.getElementById('wave-anim');if(wv)wv.style.display='flex';
    recSecs=180;updateTimer();
    recTimer=setInterval(()=>{recSecs--;updateTimer();if(recSecs<=0)stopRec();},1000);
  }).catch(()=>toast('❌ Please allow microphone access in your browser'));
}

function stopRec(){
  isRec=false;
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  if(recTimer){clearInterval(recTimer);recTimer=null;}
  const wv=document.getElementById('wave-anim');if(wv)wv.style.display='none';
}

function updateTimer(){
  const el=document.getElementById('timer-disp');if(!el)return;
  const m=String(Math.floor(recSecs/60)).padStart(2,'0');
  const s=String(recSecs%60).padStart(2,'0');
  el.textContent=`${m}:${s}`;
  el.style.color=recSecs<=10?'var(--red)':'var(--blue)';
}

function playBack(){
  if(!audioBlob)return;
  new Audio(URL.createObjectURL(audioBlob)).play();
}

function saveSession(){

let gramTab='cond',condIdx=0;
// BUG FIX: store answers in APP state so they survive re-renders
// and avoid onclick string escaping issues

function vGrammar(el){
  el.innerHTML=`

    </div>

function gCond(){
  if(!APP.data.grammarAnswers)APP.data.grammarAnswers={};
  const conds=GRAMMAR.conditionals;
  const ac=conds[condIdx];
  const correctCount=Object.keys(APP.data.grammarAnswers).filter(k=>k.startsWith('c'+condIdx+'-')&&APP.data.grammarAnswers[k]==='ok').length;

  return`
  <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
    ${conds.map((c,i)=>`<button class="btn ${condIdx===i?'btn-primary':'btn-secondary'}" onclick="condIdx=${i};renderView();">${c.type} Conditional</button>`).join('')}
  </div>
  <div class="card" style="border-left:4px solid ${ac.color};margin-bottom:20px;padding:16px 18px;">
    <div class="g2" style="gap:12px;">
      <div><div class="label">Structure</div><div style="font-size:.9rem;color:var(--text);font-weight:600;margin-top:4px;">${ac.rule}</div></div>
      <div><div class="label">When to use it</div><div style="font-size:.86rem;color:var(--text2);margin-top:4px;">${ac.use}</div></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;">
    ${ac.qs.map((q,qi)=>{
      const key='c'+condIdx+'-'+qi;
      const state=APP.data.grammarAnswers[key]||null; // null | {choice, result}
      const answered=state!==null;
      return`<div class="card">
        <div style="font-size:.92rem;color:var(--text);margin-bottom:12px;line-height:1.6;">${q.q}</div>
        <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:${answered?'12px':'0'};">
          ${q.opts.map((opt,oi)=>{
            let cls='q-opt';
            if(answered){
              if(opt===q.a)cls+=' q-correct';
              else if(opt===state.choice&&opt!==q.a)cls+=' q-wrong';
              cls+=' ';
            }
            return`<button class="${cls}" ${answered?'data-answered="true"':''} onclick="checkCond(${condIdx},${qi},${oi})">${opt}${answered&&opt===q.a?' ✓':''}</button>`;
          }).join('')}
        </div>
        ${answered?`<div style="padding:10px 13px;background:var(--raised);border-radius:7px;font-size:.83rem;color:var(--text2);line-height:1.5;">💡 ${q.exp}</div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div style="margin-top:14px;font-size:.8rem;color:var(--text3);">✅ ${correctCount} of ${ac.qs.length} correct in this section · Total grammar XP: ${Object.keys(APP.data.grammarAnswers).filter(k=>APP.data.grammarAnswers[k]==='ok').length * 5} XP</div>`;
}

// BUG FIX: use indices instead of string-escaped option values
function checkCond(condI,qi,optI){
  if(!APP.data.grammarAnswers)APP.data.grammarAnswers={};
  const key='c'+condI+'-'+qi;
  if(APP.data.grammarAnswers[key])return; // already answered
  const q=GRAMMAR.conditionals[condI].qs[qi];
  const choice=q.opts[optI];
  const correct=choice===q.a;
  APP.data.grammarAnswers[key]={choice,result:correct?'ok':'ko'};

function reviewCard(id,ok){
  const idx=(APP.data.gapList||[]).findIndex(p=>p.id===id);if(idx===-1)return;

  if(ok){p.box=Math.min(p.box+1,SRS.length-1);addXP(5,'Word Bank review');toast(`✅ "${p.phrase.substring(0,28)}" — next in ${SRS[p.box]} day${SRS[p.box]>1?'s':''}`);}
  else{p.box=1;toast('🔄 Back to daily review — practice makes perfect');}
  const next=new Date();next.setDate(next.getDate()+SRS[p.box]);
  p.nextReview=next.toISOString().slice(0,10);
  save();renderView();
}

  const todayXP=all.filter(t=>done[t.id]).reduce((s,t)=>s+t.xp,0);
  const maxXP=all.reduce((s,t)=>s+t.xp,0);

  el.innerHTML=`

          <div style="font-size:2rem;font-weight:800;color:var(--blue);line-height:1;">${APP.data.xp}</div>

        </div>
      </div>
      <div class="bar" style="height:8px;margin-bottom:14px;"><div class="bar-fill fill-gradient" style="width:${lp.pct}%;"></div></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
        ${LEVELS.map(l=>`<div style="padding:7px;text-align:center;background:${APP.data.xp>=l.xp?'var(--blue-dim)':'var(--raised)'};border:1.5px solid ${APP.data.xp>=l.xp?'rgba(91,143,255,.35)':'var(--border)'};border-radius:8px;">
          <div style="font-size:1rem;">${l.emoji}</div>
          <div style="font-size:.63rem;color:${APP.data.xp>=l.xp?'var(--blue)':'var(--text3)'};font-weight:600;margin-top:2px;">${l.name.split(' ')[0]}</div>
          <div style="font-size:.6rem;color:var(--text3);margin-top:1px;">${l.xp}+ XP</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- STATS -->
    <div class="g4 rise-2" style="margin-bottom:16px;">
      <div class="card" style="text-align:center;"><div class="stat-big" style="color:var(--blue);">${APP.data.streak}</div><div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;margin-top:4px;">Day Streak</div></div>
      <div class="card" style="text-align:center;"><div class="stat-big" style="color:var(--violet);">${APP.data.totalDays}</div><div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;margin-top:4px;">Days Active</div></div>
      <div class="card" style="text-align:center;"><div class="stat-big" style="color:var(--cyan);">${APP.data.sessions}</div><div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;margin-top:4px;">Recordings</div></div>
      <div class="card" style="text-align:center;"><div class="stat-big" style="color:var(--green);">${APP.data.wordsAdded}</div><div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;margin-top:4px;">Phrases Saved</div></div>
    </div>

    <!-- FULL HEATMAP -->
    <div class="card rise-3" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div><div style="font-weight:700;">Activity Heatmap — Full Year</div><div style="font-size:.78rem;color:var(--text3);margin-top:2px;">Each square = one day. Darker = more XP earned.</div></div>
        <div style="display:flex;gap:4px;align-items:center;font-size:.72rem;color:var(--text3);">Less ${[0,1,2,3,4].map(l=>`<div style="width:11px;height:11px;border-radius:2px;background:${['var(--border)','rgba(91,143,255,.22)','rgba(91,143,255,.48)','rgba(91,143,255,.74)','var(--blue)'][l]};"></div>`).join('')} More</div>
      </div>
      <div class="heatmap-wrap" id="hm-full"></div>
    </div>

    <!-- ROADMAP -->
    <div class="card rise-4" style="margin-bottom:16px;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:16px;">🗺️ Your Learning Roadmap</div>
      ${[
        {ph:'Phase 1',dates:'Jan – Apr 2026',name:'Foundation & Immersion',detail:'Daily BBC/NPR listening · Anki Business 600 · Recording studio habit · B2 vocabulary base',done:true},
        {ph:'Phase 2',dates:'May – Aug 2026',name:'Intensification → B2 Target',detail:'Shadowing C1 prompts · Negotiation scripts · Business scenarios · Thinking in English',done:false,current:true},
        {ph:'Phase 3',dates:'Sep – Dec 2026',name:'C1 Advanced Mastery',detail:'Presentations in English · Podcasting & recording · Written content creation in English',done:false},
        {ph:'Phase 4',dates:'2027+',name:'C2 Fluency & Beyond',detail:'Native-speed content · Mentoring others · Publishing professional content in English',done:false},
      ].map(p=>`<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
        <div style="width:5px;min-height:50px;border-radius:3px;background:${p.done?'var(--green)':p.current?'var(--blue)':'var(--border)'};flex-shrink:0;align-self:stretch;"></div>
        <div style="flex:1;">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">

        <div>📝 Phrases: <strong style="color:var(--text)">${APP.data.wordsAdded}</strong></div>
        <div>🚨 Drills: <strong style="color:var(--text)">${APP.data.panicsDone}</strong></div>

  buildHeatmap('hm-full',52);

// ──────────────────────────────────────────────────────────
//  SETTINGS
// ──────────────────────────────────────────────────────────
function openSettings(){
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:1.1rem;font-weight:800;">⚙️ Settings</h3>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕ Close</button>
    </div>
    <div style="margin-bottom:16px;">
      <div class="label">Difficulty Level</div>
      <select class="inp" id="s-diff">
        ${['beginner','intermediate','advanced'].map(d=>`<option value="${d}" ${APP.data.diff===d?'selected':''}>${d.charAt(0).toUpperCase()+d.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:16px;background:var(--raised);border-radius:var(--radius);padding:14px;">
      <div style="font-weight:700;margin-bottom:10px;font-size:.92rem;">📊 Your Stats</div>
      ${[['Total XP',APP.data.xp],['Days Active',APP.data.totalDays],['Current Streak',APP.data.streak+' days'],['Recordings',APP.data.sessions],['Phrases Saved',APP.data.wordsAdded],['Panic Drills',APP.data.panicsDone]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--text2);font-size:.84rem;">${l}</span>
        <span style="color:var(--blue);font-weight:700;font-size:.84rem;">${v}</span>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveSettings()"><i data-lucide="save"></i> Save</button>
      <button class="btn btn-red" onclick="confirmReset()">🗑️ Reset All</button>
    </div>
  `);
}

function saveSettings(){
  APP.data.diff=document.getElementById('s-diff')?.value||'intermediate';
  save();closeModal();toast('✅ Settings saved!');
}

function confirmReset(){
  if(confirm('Reset all your progress? This cannot be undone.')){
    APP.data={...DEFAULTS};save();closeModal();
    toast('Progress reset — starting fresh!');
    updateSidebar();renderNav();renderView();
  }
}

// ──────────────────────────────────────────────────────────
//  MODAL / TOASTS / UTILITIES
// ──────────────────────────────────────────────────────────
function openModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('overlay').classList.add('on');
  lucide.createIcons();
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}
function maybeCloseModal(e){if(e.target===document.getElementById('overlay'))closeModal();}

function toggleEl(id){
  const el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function toast(msg,dur=3000){
  const c=document.getElementById('toast-stack');
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(110%)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},dur);
}

// ──────────────────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────────────────
function init(){
  load();
  updateSidebar();
  renderNav();
  renderView();

  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openQuickNav();}
    if(e.key==='Escape'){closeModal();endPanic();}
  });
}

function openQuickNav(){
  openModal(`
    <div style="font-size:.8rem;color:var(--text3);margin-bottom:12px;">⌘K · Quick navigation</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${NAV.map(n=>`<button class="btn btn-secondary" style="justify-content:flex-start;gap:12px;" onclick="navigate('${n.id}');closeModal();">
        ${n.emoji} ${n.label}
      </button>`).join('')}
    </div>
  `);
}

init();
</script>
